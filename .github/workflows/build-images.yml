# Reusable per-target build, called once per matrix SHARD by docker.yml. A full
# rebuild is now >256 targets per arch, which exceeds GitHub's hard cap of 256
# configurations per matrix job. docker.yml shards each arch's plan matrix into
# <=250-entry slices and calls this workflow once per slice (see build-amd64 /
# build-arm64 there), so no single matrix ever exceeds the cap. Sharding also
# collapses what were two byte-identical build jobs (amd64/arm64) into this one
# definition, parameterized by `runner` and the per-arch matrix.
name: Build shell images (shard)

on:
  workflow_call:
    inputs:
      runner:
        description: "Native runner label for this arch (ubuntu-24.04 | ubuntu-24.04-arm)"
        required: true
        type: string
      matrix:
        description: "One shard's plan matrix as JSON: {\"include\":[...]} (<=256 entries)"
        required: true
        type: string
      toolchain_ref:
        required: true
        type: string
      runtime_ref:
        required: true
        type: string
      buildkit_ref:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: ${{ github.event_name == 'push' }}
      matrix: ${{ fromJSON(inputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      # Restore the shared dependency sources (ncurses/readline/libedit/pcre) the
      # common-sources job cached, BEFORE single-download: shvr_download_<shell>
      # pulls these in, and with them already present it fetches only the shell's
      # own source instead of re-hitting their flaky upstreams.
      - uses: ./.github/actions/common-downloads
      - uses: ./.github/actions/single-download
        with:
          shvr_shell: ${{ matrix.shell }}
          shvr_version: "${{ matrix.version }}"
          cache_path: "${{ matrix.cache_path }}"
      - uses: ./.github/actions/toolchain-downloads

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No Docker Hub login here: the per-target :<target>-<arch> images are
      # internal building blocks and are pushed to GHCR only. Docker Hub receives
      # just the user-facing multi-arch :<target> lists, assembled from the GHCR
      # arch images by the target-manifest job.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=${{ inputs.buildkit_ref }}

      - name: Build and push shell image
        uses: ./.github/actions/build-push-retry
        with:
          context: .
          target: artifacts
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event_name == 'push' && format('{0}-{1}', matrix.target, matrix.arch) || format('run-{0}-{1}-{2}', github.run_id, matrix.target, matrix.arch) }}
          build-args: |
            TARGETS=${{ matrix.target }}
            TOOLCHAIN_BASE=${{ inputs.toolchain_ref }}
            RUNTIME_BASE=${{ inputs.runtime_ref }}
          # THE toolchain contract. `toolchain` names a stage in the Dockerfile
          # (FROM ${TOOLCHAIN_BASE} AS toolchain), and a named build context of the
          # same name REPLACES that stage with this image -- so the stage is never
          # executed here and musl-cross-make is never compiled in a build job.
          #
          # This is what makes toolchain reuse a fact rather than a cache-hit
          # lottery. Previously the stage was local and reuse depended entirely on
          # a layer-cache hit; a stale or evicted cache silently recompiled the
          # toolchain in EVERY one of the ~250 build jobs. Silently, because a
          # cache miss is not an error in BuildKit -- it just does the work again.
          # Now a missing toolchain image is a hard pull failure instead.
          #
          # Do not delete this and do not "simplify" it back into cache-from.
          # workflow-verification.yml fails the build if an `artifacts` build has
          # no toolchain build context.
          build-contexts: |
            toolchain=docker-image://ghcr.io/${{ github.repository }}:run-${{ github.run_id }}-toolchain-${{ matrix.arch }}
          # Only the builder-stage layers are cached per target now. The toolchain
          # cache refs are deliberately absent: the stage above is not built here,
          # so listing them would just make every job pull multi-GB of cache
          # metadata it cannot use.
          #
          # Two refs, one per event, and main reads both. A PR used to export
          # NOWHERE (cache-to rendered to the empty string), so the merge that
          # followed compiled from scratch against a buildcache still holding
          # pre-PR layers -- the PR's work was thrown away every time. A PR now
          # exports to its own `-pr` ref, which the push build also reads, so the
          # merge replays those layers instead of recompiling them.
          #
          # The `-pr` ref is separate on purpose: PRs must never displace the
          # authoritative cache. Last-writer-wins on a shared ref would let an
          # experimental or abandoned PR evict main's layers, costing later runs a
          # miss for no reason. Only a push writes the authoritative ref.
          #
          # ignore-error keeps a cache export from failing an otherwise-good
          # build (a fork PR gets no packages:write and cannot export at all).
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ matrix.target }}-${{ matrix.arch }}
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-pr-${{ matrix.target }}-${{ matrix.arch }}
          cache-to: >-
            ${{ github.event_name == 'push'
              && format('type=registry,ref=ghcr.io/{0}:buildcache-{1}-{2},mode=max,ignore-error=true', github.repository, matrix.target, matrix.arch)
              || format('type=registry,ref=ghcr.io/{0}:buildcache-pr-{1}-{2},mode=max,ignore-error=true', github.repository, matrix.target, matrix.arch) }}
          # Single-manifest image so the OID annotation sits at the manifest top
          # level, readable via `imagetools inspect --raw` without pulling layers.
          # The OID comes from the plan matrix entry (shvr_plan_matrix) and is
          # arch-specific.
          provenance: false
          annotations: |
            manifest:org.shvr.oid=${{ matrix.oid }}
          labels: |
            org.shvr.oid=${{ matrix.oid }}

      - name: Verify build checksums
        uses: ./.github/actions/verify-build-checksums
        with:
          arch: ${{ matrix.arch }}
          image: >-
            ${{ github.event_name == 'push'
              && format('ghcr.io/{0}:{1}-{2}', github.repository, matrix.target, matrix.arch)
              || format('ghcr.io/{0}:run-{1}-{2}-{3}', github.repository, github.run_id, matrix.target, matrix.arch) }}
          targets: ${{ matrix.target }}
