name: Build shell versions

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Rebuild every target, ignoring the content-addressed skip"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Pinned base image source digests. The `mirror` job copies these exact
  # digests from docker.io into a run-scoped GHCR tag and exports
  # ghcr.io/...@<digest> refs for the toolchain/build/assemble jobs, so
  # every job in a single run uses immutable, race-free base images.
  # Bump these (and regenerate build checksums) when refreshing the base.
  # Keep in sync with Dockerfile ARG defaults.
  MIRROR_TOOLCHAIN_SOURCE: debian:trixie-slim@sha256:cedb1ef40439206b673ee8b33a46a03a0c9fa90bf3732f54704f99cb061d2c5a
  MIRROR_RUNTIME_SOURCE: busybox:stable-musl@sha256:3c6ae8008e2c2eedd141725c30b20d9c36b026eb796688f88205845ef17aa213
  # BuildKit builder image for the docker-container driver. Mirrored to
  # GHCR like the bases so booting a builder never pulls from Docker Hub
  # (the recurring "Booting builder ... context deadline exceeded"). Pin
  # matches docker/setup-buildx-action@v4's default tag, buildx-stable-1.
  MIRROR_BUILDKIT_SOURCE: moby/buildkit:buildx-stable-1@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

jobs:
  # Note: there is no bulk `download` job. Each build job fetches its own
  # target's source (single-download), and a separate scheduled workflow
  # (warm-sources.yml) keeps every source cache warm so skipped targets stay
  # rebuildable even if upstream later removes a tarball.
  mirror:
    runs-on: ubuntu-24.04
    outputs:
      toolchain_ref: ${{ steps.resolve.outputs.toolchain_ref }}
      runtime_ref: ${{ steps.resolve.outputs.runtime_ref }}
      buildkit_ref: ${{ steps.resolve.outputs.buildkit_ref }}
    env:
      # Run-scoped GHCR tags. The `run-` prefix matches the existing
      # ephemeral cleanup filter in ghcr-cleanup.yml, so these mirror
      # tags are reaped automatically; PR and push runs never overwrite
      # each other or any long-lived shared tag.
      TOOLCHAIN_TAG: ghcr.io/${{ github.repository }}:run-${{ github.run_id }}-mirror-toolchain
      RUNTIME_TAG: ghcr.io/${{ github.repository }}:run-${{ github.run_id }}-mirror-runtime
      BUILDKIT_TAG: ghcr.io/${{ github.repository }}:run-${{ github.run_id }}-mirror-buildkit
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No setup-buildx-action here on purpose: `imagetools` is a
      # registry-side operation that uses the preinstalled default builder,
      # so it never boots a buildkit container. That breaks the
      # chicken-and-egg of mirroring the buildkit image itself.
      - name: Mirror base images to run-scoped GHCR tags
        run: |
          set -eu
          retry() {
            for attempt in 1 2 3; do
              if "$@"; then return 0; fi
              echo "attempt ${attempt} failed: $*" >&2
              sleep 5
            done
            return 1
          }
          retry docker buildx imagetools create \
            --tag "${TOOLCHAIN_TAG}" "${MIRROR_TOOLCHAIN_SOURCE}"
          retry docker buildx imagetools create \
            --tag "${RUNTIME_TAG}" "${MIRROR_RUNTIME_SOURCE}"
          retry docker buildx imagetools create \
            --tag "${BUILDKIT_TAG}" "${MIRROR_BUILDKIT_SOURCE}"

      - name: Resolve digest-pinned refs
        id: resolve
        run: |
          toolchain_digest=$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "${TOOLCHAIN_TAG}")
          runtime_digest=$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "${RUNTIME_TAG}")
          buildkit_digest=$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "${BUILDKIT_TAG}")
          {
            echo "toolchain_ref=ghcr.io/${{ github.repository }}@${toolchain_digest}"
            echo "runtime_ref=ghcr.io/${{ github.repository }}@${runtime_digest}"
            echo "buildkit_ref=ghcr.io/${{ github.repository }}@${buildkit_digest}"
          } >> "$GITHUB_OUTPUT"

  toolchain:
    needs: [mirror, plan]
    # Nothing to build a toolchain for when the plan is empty, and the image is
    # multi-GB to push. The build jobs gate on the same counts, and a job whose
    # `needs` was skipped is skipped too, so this cannot leave a build job without
    # its toolchain: if either arch has work, both toolchains are published.
    if: needs.plan.outputs.count_amd64 != '0' || needs.plan.outputs.count_arm64 != '0'
    # One toolchain per arch, each on a native runner so its musl-cross-make and
    # Rust target build natively. Cache refs/scopes are arch-suffixed so the two
    # arches never cross-pollute each other's layers.
    #
    # This job PUBLISHES the toolchain as an image, and the build jobs consume it
    # by name (see the build-contexts note there). It is not merely a cache warmer:
    # a build job must never be able to re-derive the toolchain itself, because
    # "re-derive" means compiling musl-cross-make in every one of ~250 jobs.
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    env:
      # Run-scoped, like the mirror job's tags: written by exactly one job in this
      # run, read by that run's build jobs, and reaped by ghcr-cleanup.yml's
      # `run-` filter. PR and push runs can never overwrite each other, and no
      # long-lived shared tag is involved, so there is no cross-run race.
      TOOLCHAIN_IMAGE: ghcr.io/${{ github.repository }}:run-${{ github.run_id }}-toolchain-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/toolchain-downloads

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=${{ needs.mirror.outputs.buildkit_ref }}

      - name: Build and push toolchain image
        uses: ./.github/actions/build-push-retry
        with:
          context: .
          target: toolchain
          push: "true"
          tags: ${{ env.TOOLCHAIN_IMAGE }}
          platforms: linux/${{ matrix.arch }}
          # Single-arch image, and nothing consumes an attestation manifest here;
          # provenance would only add a manifest list the build jobs must resolve.
          provenance: false
          build-args: |
            TOOLCHAIN_BASE=${{ needs.mirror.outputs.toolchain_ref }}
            RUNTIME_BASE=${{ needs.mirror.outputs.runtime_ref }}
          # Layer cache for THIS job only, so an unchanged toolchain is not
          # recompiled every run. It is no longer load-bearing for the build jobs:
          # they consume the image above, so a cache miss here costs one job per
          # arch rather than a musl-cross-make compile in all ~250 of them.
          #
          # The registry export used to be push-only, which left a PR that moved
          # the toolchain fingerprint with nothing main could reuse: the type=gha
          # entry below does not cross the PR->main boundary, because GitHub scopes
          # a feature branch's cache away from the default branch (main can never
          # read a PR branch's entries). So main recompiled musl-cross-make even
          # though the PR had just done it. A PR now exports to its own `-pr` ref,
          # which the push build reads too. Separate ref for the same reason as the
          # per-target buildcache: a PR must not displace the authoritative one.
          cache-to: |
            type=gha,scope=toolchain-${{ matrix.arch }}-v3,mode=max
            ${{ github.event_name == 'push' && format('type=registry,ref=ghcr.io/{0}:cache-toolchain-{1},mode=max,ignore-error=true', github.repository, matrix.arch) || format('type=registry,ref=ghcr.io/{0}:cache-toolchain-pr-{1},mode=max,ignore-error=true', github.repository, matrix.arch) }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}:cache-toolchain-${{ matrix.arch }}
            type=registry,ref=ghcr.io/${{ github.repository }}:cache-toolchain-pr-${{ matrix.arch }}
            type=gha,scope=toolchain-${{ matrix.arch }}-v3

  # Decide which targets actually need building. Each pushed per-target image
  # carries an org.shvr.oid annotation (its content-addressed build identity);
  # a target whose published OID still matches the freshly computed one cannot
  # have changed and is skipped. Emits a dynamic build matrix consumed below.
  plan:
    runs-on: ubuntu-24.04
    outputs:
      # Per-arch matrices: GitHub caps a job's matrix at 256 configurations, and a
      # full rebuild is ~250 targets PER ARCH, so the two arches must drive two
      # separate build jobs rather than one merged 2x matrix.
      # Per-arch shard maps: a JSON object {"<shard>": {"include":[...]}, ...},
      # each slice <=250 entries so no build matrix exceeds GitHub's 256 cap.
      # shards_* is the list of shard keys the build job fans out over.
      shardmap_amd64: ${{ steps.plan.outputs.shardmap_amd64 }}
      shardmap_arm64: ${{ steps.plan.outputs.shardmap_arm64 }}
      shards_amd64: ${{ steps.plan.outputs.shards_amd64 }}
      shards_arm64: ${{ steps.plan.outputs.shards_arm64 }}
      count_amd64: ${{ steps.plan.outputs.count_amd64 }}
      count_arm64: ${{ steps.plan.outputs.count_arm64 }}
      # Targets whose exact OID is already published under oid-<arch>-<oid> and so
      # only need re-tagging. Disjoint from the build matrices; both arches share
      # one matrix (see the promote job).
      matrix_promote: ${{ steps.plan.outputs.matrix_promote }}
      count_promote: ${{ steps.plan.outputs.count_promote }}
      built: ${{ steps.plan.outputs.built }}
      # The assemble job's matrix, computed from THIS checkout's versions so it is
      # never stale: latest = shvr_current, all = shvr_targets + prerelease. Was a
      # static AUTO-GENERATED block baked into this file; making it dynamic means a
      # version bump no longer edits docker.yml, so per-shell update PRs stay
      # disjoint (each touches only its versions/checksums) and never conflict here.
      assembly_matrix: ${{ steps.plan.outputs.assembly_matrix }}
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Plan targets to build
        id: plan
        env:
          REPO: ${{ github.repository }}
          FORCE_ALL: ${{ github.event.inputs.force_all }}
        run: |
          set -eu
          # Kill-switch: rebuild everything on manual force_all or a
          # [rebuild-all] commit-message flag.
          force=0
          if [ "${FORCE_ALL:-}" = "true" ]; then force=1; fi
          if git log -1 --pretty=%B | grep -qiF '[rebuild-all]'; then force=1; fi

          # Read each target+arch's published OID from the arch-suffixed
          # :<target>-<arch> tag's manifest annotation, without pulling layers.
          # Any read failure or a missing image yields MISSING -> (re)build. The
          # skip is safe-by-default: it can over-build but never wrongly skip.
          # The OID is arch-specific (arch is folded into the fingerprint), so the
          # two arches are planned independently.
          #
          # A target that does NOT match still might not need compiling: the
          # content-addressed oid-<arch>-<oid> tag is written by every build,
          # including a PR's, so when a PR built this exact OID the image already
          # exists and only needs re-tagging. The 4th column records that, and
          # plan_matrix routes those rows to `promote` instead of `build`. This is
          # what stops a merge from redoing the work its own PR just did.
          #
          # Probed on push ONLY. On a PR nothing writes the stable tag, and the
          # assemble job reads a skipped target from that stable tag -- so letting
          # a PR "promote" would have it assemble the PREVIOUS content instead of
          # what the PR actually produced. force=1 likewise never promotes: the
          # kill-switch means rebuild, not re-tag.
          : > registry_oids.txt
          for arch in amd64 arm64; do
            SHVR_ARCH="$arch" sh shvr.sh build_identities > "desired_${arch}.txt"
            while read -r t desired; do
              if [ "$force" = 1 ]; then
                printf '%s %s FORCE no\n' "$t" "$arch" >> registry_oids.txt
                continue
              fi
              # </dev/null on every docker call: this loop reads the target list on
              # stdin, and a child that consumes stdin would eat it and silently cut
              # the plan short -- a truncated plan means targets are never built.
              oid=$(docker buildx imagetools inspect --raw "ghcr.io/${REPO}:${t}-${arch}" </dev/null 2>/dev/null \
                    | jq -r '.annotations["org.shvr.oid"] // empty' 2>/dev/null || true)
              oid="${oid:-MISSING}"
              promotable=no
              if [ "${{ github.event_name }}" = "push" ] \
                 && [ "$desired" != MISSING ] && [ "$oid" != "$desired" ] \
                 && docker buildx imagetools inspect --raw "ghcr.io/${REPO}:oid-${arch}-${desired}" </dev/null >/dev/null 2>&1
              then
                promotable=yes
              fi
              printf '%s %s %s %s\n' "$t" "$arch" "$oid" "$promotable" >> registry_oids.txt
            done < "desired_${arch}.txt"
          done

          # plan_matrix runs once per arch (SHVR_ARCH selects the fingerprint and
          # checksum dir); each emits a separate {include:[...]} consumed by that
          # arch's build job. Kept separate (not merged) to stay under the 256
          # configurations-per-matrix limit on a full rebuild.
          amd=$(SHVR_ARCH=amd64 sh shvr.sh plan_matrix registry_oids.txt build)
          arm=$(SHVR_ARCH=arm64 sh shvr.sh plan_matrix registry_oids.txt build)
          count_amd64=$(printf '%s' "$amd" | jq '.include | length')
          count_arm64=$(printf '%s' "$arm" | jq '.include | length')
          # The promote half: same rows-that-need-work set, disjoint from the build
          # half. Both arches share one matrix -- re-tagging is a registry-side
          # metadata copy, so it needs no native runner and cannot approach the
          # 256-configuration cap the build matrices are sharded for.
          pro=$(printf '%s\n%s' \
            "$(SHVR_ARCH=amd64 sh shvr.sh plan_matrix registry_oids.txt promote)" \
            "$(SHVR_ARCH=arm64 sh shvr.sh plan_matrix registry_oids.txt promote)" \
            | jq -c -s '{include: [.[].include[]]}')
          count_promote=$(printf '%s' "$pro" | jq '.include | length')
          # "<target>-<arch>" list of rows built this run, for the assemble job to
          # tell apart freshly-built (run-scoped) from reused (stable) images.
          # Promoted rows are deliberately NOT here: they are not built this run,
          # and by the time assemble runs they resolve from the stable tag the
          # promote job wrote -- which is exactly the non-built path.
          built=$(printf '%s\n%s' "$amd" "$arm" | jq -r -s '[.[].include[] | (.target + "-" + .arch)] | join(" ")')

          # The assemble matrix, from THIS checkout's versions (not a static list):
          # latest = shvr_current, all = shvr_targets + prerelease, one row per arch.
          # Same composition shvr_github_regen_docker_workflow used to bake in; now
          # computed each run so it always matches the versions present. targets is a
          # space-joined string (what the old folded `>` scalar produced), which the
          # assemble job word-splits. Computed unconditionally -- assemble runs even
          # when count==0 (it reassembles flavors from existing images).
          latest_targets=$(sh shvr.sh current   | sort -t'_' -k1,1 -k2Vr)
          all_targets=$( { sh shvr.sh targets; sh shvr.sh prerelease; } | sort -t'_' -k1,1 -k2Vr)
          assembly_matrix=$(jq -c -n \
            --arg latest "$(echo $latest_targets)" \
            --arg all "$(echo $all_targets)" \
            '{include: [
               {flavor:"latest", arch:"amd64", targets:$latest},
               {flavor:"latest", arch:"arm64", targets:$latest},
               {flavor:"all",    arch:"amd64", targets:$all},
               {flavor:"all",    arch:"arm64", targets:$all}
             ]}')
          # Shard each arch's matrix into <=250-entry slices so no build job's
          # matrix exceeds GitHub's 256-configuration cap (a full toolchain-bump
          # rebuild is >256 targets/arch). Emitted as a {"<shard>": {"include":[...]}}
          # map the build job fans out over by shard key. Empty input -> {} -> no
          # shards, and the build job's `if: count != 0` gate skips it.
          shard() { jq -c --argjson n 250 '
            .include as $all
            | reduce range(0; ($all | length); $n) as $i ({};
                . + { (($i / $n | floor) | tostring): { include: $all[$i:$i+$n] } })'; }
          shardmap_amd64=$(printf '%s' "$amd" | shard)
          shardmap_arm64=$(printf '%s' "$arm" | shard)
          printf 'shardmap_amd64=%s\n' "$shardmap_amd64" >> "$GITHUB_OUTPUT"
          printf 'shardmap_arm64=%s\n' "$shardmap_arm64" >> "$GITHUB_OUTPUT"
          printf 'shards_amd64=%s\n' "$(printf '%s' "$shardmap_amd64" | jq -c 'keys')" >> "$GITHUB_OUTPUT"
          printf 'shards_arm64=%s\n' "$(printf '%s' "$shardmap_arm64" | jq -c 'keys')" >> "$GITHUB_OUTPUT"
          printf 'count_amd64=%s\n'  "$count_amd64" >> "$GITHUB_OUTPUT"
          printf 'count_arm64=%s\n'  "$count_arm64" >> "$GITHUB_OUTPUT"
          printf 'matrix_promote=%s\n' "$pro"          >> "$GITHUB_OUTPUT"
          printf 'count_promote=%s\n'  "$count_promote" >> "$GITHUB_OUTPUT"
          printf 'built=%s\n'        "$built"       >> "$GITHUB_OUTPUT"
          printf 'assembly_matrix=%s\n' "$assembly_matrix" >> "$GITHUB_OUTPUT"
          printf '%s amd64 + %s arm64 of %s target(s) need building; %s promoted from an existing build\n' \
            "$count_amd64" "$count_arm64" "$(sh shvr.sh buildset | wc -l)" "$count_promote" >> "$GITHUB_STEP_SUMMARY"

  # Fetch the shared build-dependency SOURCES (ncurses, readline, libedit, pcre)
  # ONCE, before the build fan-out, and cache them. They live outside any target's
  # single-download cache_path, so without this every build job re-fetches them
  # from their flaky upstreams and one failed fetch fails that build. The build
  # jobs restore this cache instead. Mirrors the toolchain job's role for the
  # compiler sources. Runs once (no arch matrix); the tarballs are arch-neutral.
  common-sources:
    needs: [plan]
    if: needs.plan.outputs.count_amd64 != '0' || needs.plan.outputs.count_arm64 != '0'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/common-downloads

  # A full rebuild is >256 targets per arch, which exceeds GitHub's hard cap of
  # 256 configurations per matrix job. So each arch fans out over the plan's
  # shards (each <=250 targets) and calls the reusable per-target build workflow
  # (build-images.yml) once per shard -- no single matrix ever hits the cap. This
  # also collapses what were two byte-identical build jobs into one definition.
  build-amd64:
    needs: [plan, toolchain, mirror, common-sources]
    if: needs.plan.outputs.count_amd64 != '0'
    strategy:
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards_amd64) }}
    uses: ./.github/workflows/build-images.yml
    with:
      runner: ubuntu-24.04
      matrix: ${{ toJSON(fromJSON(needs.plan.outputs.shardmap_amd64)[matrix.shard]) }}
      toolchain_ref: ${{ needs.mirror.outputs.toolchain_ref }}
      runtime_ref: ${{ needs.mirror.outputs.runtime_ref }}
      buildkit_ref: ${{ needs.mirror.outputs.buildkit_ref }}
    secrets: inherit

  build-arm64:
    needs: [plan, toolchain, mirror, common-sources]
    if: needs.plan.outputs.count_arm64 != '0'
    strategy:
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards_arm64) }}
    uses: ./.github/workflows/build-images.yml
    with:
      runner: ubuntu-24.04-arm
      matrix: ${{ toJSON(fromJSON(needs.plan.outputs.shardmap_arm64)[matrix.shard]) }}
      toolchain_ref: ${{ needs.mirror.outputs.toolchain_ref }}
      runtime_ref: ${{ needs.mirror.outputs.runtime_ref }}
      buildkit_ref: ${{ needs.mirror.outputs.buildkit_ref }}
    secrets: inherit

  # Adopt an image that was already built, instead of building it again.
  #
  # Every build publishes its output twice: under an event-dependent tag, and
  # under the content-addressed oid-<arch>-<oid>. So when a PR builds a target,
  # the artifact for that exact OID is already in the registry by the time the PR
  # merges -- the merge used to rebuild it purely because the stable tag had not
  # moved yet. This job moves the stable tag onto the existing image instead.
  #
  # push-only, by construction: only main may move a stable tag, and the plan job
  # never marks anything promotable on a PR (see the probe there).
  #
  # Trust: main adopts bytes produced during a PR run. That is sound rather than
  # convenient -- the OID folds in the committed checksums and the whole recipe
  # closure, so an image published as oid-<arch>-<oid> cannot be the output of
  # different sources; only same-repo runs can push at all (a fork PR gets no
  # packages:write); and the checksums are re-verified below before the tag moves.
  promote:
    needs: [plan]
    if: needs.plan.outputs.count_promote != '0' && github.event_name == 'push'
    # Native runner per arch, like assemble. The re-tag itself is arch-neutral
    # registry metadata, but the verify step below extracts the image with
    # `docker create` + `docker cp`, and pointing that at a foreign-arch image is
    # asking for a platform-mismatch failure. Matching the runner keeps it the
    # same same-arch extraction the build job already does.
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix_promote) }}
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-verify before adopting. The PR run already did this, but that was a
      # different run against a different checkout; this makes the stable tag's
      # contents provably match the checksums committed on main.
      - name: Verify build checksums
        uses: ./.github/actions/verify-build-checksums
        with:
          arch: ${{ matrix.arch }}
          image: ghcr.io/${{ github.repository }}:oid-${{ matrix.arch }}-${{ matrix.oid }}
          targets: ${{ matrix.target }}

      # crane copy, NOT `buildx imagetools create`: imagetools rewraps the source
      # into a fresh manifest list, which drops the top-level org.shvr.oid
      # annotation the plan job reads -- the next run would then see MISSING and
      # rebuild, silently undoing this job. crane copies the manifest byte-for-byte,
      # so the digest and the annotation both survive.
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4
      - name: Promote to the stable tag
        run: |
          set -eu
          src="ghcr.io/${{ github.repository }}:oid-${{ matrix.arch }}-${{ matrix.oid }}"
          dst="ghcr.io/${{ github.repository }}:${{ matrix.target }}-${{ matrix.arch }}"
          crane copy "$src" "$dst"

          # The whole point is that the next plan reads this back and skips. If the
          # annotation did not survive the copy, fail loudly here rather than let
          # the run "succeed" into a permanent rebuild loop.
          got=$(crane manifest "$dst" | jq -r '.annotations["org.shvr.oid"] // empty')
          if [ "$got" != "${{ matrix.oid }}" ]; then
            echo "promote: $dst carries OID '${got:-<none>}', expected '${{ matrix.oid }}'" >&2
            exit 1
          fi
          printf 'promoted %s -> %s\n' "$src" "$dst" >> "$GITHUB_STEP_SUMMARY"

  assemble:
    needs: [plan, build-amd64, build-arm64, promote, mirror]
    # Run even when build was skipped (0 changed targets): flavors are
    # reassembled from the per-target images (rebuilt this run or reused from a
    # prior push) and the full-set checksum verify still guards every binary.
    # Only bail if a build actually failed or was cancelled.
    if: >-
      always()
      && needs.mirror.result == 'success'
      && needs.plan.result == 'success'
      && needs['build-amd64'].result != 'failure'
      && needs['build-amd64'].result != 'cancelled'
      && needs['build-arm64'].result != 'failure'
      && needs['build-arm64'].result != 'cancelled'
      && needs.promote.result != 'failure'
      && needs.promote.result != 'cancelled'
    # Each (flavor, arch) is assembled on its native runner: the final stage's
    # RUN (manifest.txt generation) and the COPY --from of per-arch images both
    # execute under the matching arch with no emulation.
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    env:
      ALL_TARGETS: ${{ matrix.targets }}
      ARCH: ${{ matrix.arch }}
      RUNTIME_REF: ${{ needs.mirror.outputs.runtime_ref }}
      # Rows actually built this run (from the plan job), keyed "<target>-<arch>".
      # On a PR these carry run-scoped tags; every other target+arch is reused
      # from its stable tag.
      BUILT_TARGETS: ${{ needs.plan.outputs.built }}
      # Per-arch flavor image, pushed to GHCR only (internal building block); the
      # assemble-manifest job fuses the two arches into the user-facing multi-arch
      # :<flavor> manifest list on Docker Hub.
      ASSEMBLY_TAG: >-
        ${{ github.event_name == 'push'
          && format('ghcr.io/{0}:{1}-{2}', github.repository, matrix.flavor, matrix.arch)
          || format('ghcr.io/{0}:run-{1}-{2}-{3}', github.repository, github.run_id, matrix.flavor, matrix.arch) }}
    strategy:
      fail-fast: false
      # Dynamic assembly matrix from the plan job (latest = shvr_current, all =
      # shvr_targets + prerelease), computed from this checkout's versions so it
      # is never stale. This replaced a ~675-line AUTO-GENERATED static block; a
      # version bump no longer edits docker.yml, so per-shell update PRs stay
      # disjoint and never conflict here. See plan.outputs.assembly_matrix.
      matrix: ${{ fromJSON(needs.plan.outputs.assembly_matrix) }}
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No Docker Hub login: the per-arch flavor image is pushed to GHCR only.
      # Docker Hub receives just the fused multi-arch :<flavor> list, built from
      # the GHCR arch images by the assemble-manifest job.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=${{ needs.mirror.outputs.buildkit_ref }}

      - name: Generate assembly Dockerfile
        run: |
          # Overlayfs caps mount options at one page (~4KB) and lower
          # layers at 500; a single stage with one COPY layer per target
          # (~500 for "all") exceeds both. Chunk targets into shallow
          # stages, then merge the chunks.
          set -eu
          # Per-target images are arch-suffixed (:<target>-<arch>). On a PR, a
          # target+arch built this run is at run-<id>-<target>-<arch>; one skipped
          # this run is reused from its stable :<target>-<arch> image (a prior push
          # to main). On push everything resolves to the stable :<target>-<arch>.
          is_built () { case " ${BUILT_TARGETS} " in *" $1-${ARCH} "*) return 0 ;; *) return 1 ;; esac ; }
          chunk_size=8
          i=0
          last_chunk=0
          {
            for target in $ALL_TARGETS; do
              if [ $((i % chunk_size)) -eq 0 ]; then
                last_chunk=$((i / chunk_size))
                echo "FROM scratch AS chunk_${last_chunk}"
              fi
              if [ "${{ github.event_name }}" = "pull_request" ] && is_built "$target"; then
                src="ghcr.io/${{ github.repository }}:run-${{ github.run_id }}-${target}-${ARCH}"
              else
                src="ghcr.io/${{ github.repository }}:${target}-${ARCH}"
              fi
              echo "COPY --from=${src} --chown=0:0 /opt /opt"
              echo "COPY --from=${src} --chown=0:0 /deps /deps"
              echo "COPY --from=${src} --chown=0:0 /shvr/checksums/build /shvr/checksums/build"
              i=$((i + 1))
            done
            echo 'FROM scratch AS collected'
            c=0
            while [ "$c" -le "$last_chunk" ]; do
              echo "COPY --from=chunk_${c} --chown=0:0 / /"
              c=$((c + 1))
            done
            echo "FROM ${RUNTIME_REF}"
            echo 'COPY "entrypoint.sh" "/opt/shvr/entrypoint.sh"'
            echo 'ENV SHVR_DIR_OUT=/opt'
            echo 'WORKDIR /'
            echo 'COPY --from=collected --chown=0:0 /opt /opt'
            echo 'COPY --from=collected --chown=0:0 /deps /'
            echo 'COPY --from=collected --chown=0:0 /shvr/checksums/build /opt/shvr/checksums/build'
            echo "RUN find /opt \( -type l -o -type f \) -not -path '*/shvr/*' | sort > /opt/shvr/manifest.txt"
            echo 'ENTRYPOINT [ "/bin/sh", "/opt/shvr/entrypoint.sh" ]'
          } > Dockerfile.assembly

      - name: Build and push assembled image
        uses: ./.github/actions/build-push-retry
        with:
          context: .
          file: Dockerfile.assembly
          platforms: linux/${{ matrix.arch }}
          push: "true"
          tags: ${{ env.ASSEMBLY_TAG }}

      - name: Verify build checksums
        uses: ./.github/actions/verify-build-checksums
        with:
          arch: ${{ matrix.arch }}
          image: ${{ env.ASSEMBLY_TAG }}
          targets: ${{ env.ALL_TARGETS }}

      - name: Generate and upload build checksums
        if: github.event_name == 'push' && matrix.flavor == 'all'
        uses: ./.github/actions/generate-build-checksums
        with:
          arch: ${{ matrix.arch }}
          image: ${{ env.ASSEMBLY_TAG }}
          artifact_name: shvr-build-checksums-${{ matrix.arch }}

  # Fuse the two per-arch flavor images (:<flavor>-amd64 + :<flavor>-arm64) into
  # the published multi-arch manifest list :<flavor>. This is the only point the
  # user-facing :latest / :all become multi-arch; `docker pull` then selects the
  # native arch per platform (arm64 on Apple Silicon, no --platform, no Rosetta).
  # imagetools create is a registry-side op on the preinstalled default builder,
  # so no buildx container is booted (same pattern as the mirror job).
  assemble-manifest:
    needs: [assemble]
    if: always() && needs.assemble.result == 'success'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        flavor: [latest, all]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Fuse per-arch flavors into a multi-arch manifest list
        env:
          FLAVOR: ${{ matrix.flavor }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
        run: |
          set -eu
          retry() { for a in 1 2 3; do "$@" && return 0; echo "retry $a: $*" >&2; sleep 5; done; return 1; }
          # Sources are always the GHCR per-arch flavor images (the only place
          # they are pushed). On push the destination is the user-facing Docker
          # Hub :<flavor> list — imagetools create copies the source arch
          # manifests into the Hub repo by digest. On a PR everything stays in a
          # run-scoped GHCR tag.
          if [ "$EVENT" = "push" ]; then
            target="alganet/shell-versions:${FLAVOR}"
            amd="ghcr.io/${REPO}:${FLAVOR}-amd64"
            arm="ghcr.io/${REPO}:${FLAVOR}-arm64"
          else
            target="ghcr.io/${REPO}:run-${RUN_ID}-${FLAVOR}"
            amd="ghcr.io/${REPO}:run-${RUN_ID}-${FLAVOR}-amd64"
            arm="ghcr.io/${REPO}:run-${RUN_ID}-${FLAVOR}-arm64"
          fi
          retry docker buildx imagetools create --tag "$target" "$amd" "$arm"
          # Sanity: the list must advertise both platforms.
          docker buildx imagetools inspect "$target"

  # Publish a multi-arch manifest list for EVERY per-target image so users can
  # `docker pull .../<shell>_<version>` and get their native arch. The per-arch
  # :<target>-<arch> images stay (the plan job reads their arch-specific OID and
  # the assembly copies from them); this only adds the fused :<target> list on
  # top, for both registries. Push only — on a PR the per-target images are
  # run-scoped and ephemeral, so there is nothing stable to fuse. Runs even when
  # build was skipped (0 changed): unchanged targets keep both arch images from a
  # prior push and re-fusing is idempotent (identical source digests).
  target-manifest:
    # promote is a dependency because it MOVES the stable per-arch tags this job
    # fuses. Fusing before it runs would publish the previous digest for every
    # promoted target.
    needs: [plan, build-amd64, build-arm64, promote]
    if: >-
      always()
      && github.event_name == 'push'
      && needs.plan.result == 'success'
      && needs['build-amd64'].result != 'failure'
      && needs['build-amd64'].result != 'cancelled'
      && needs['build-arm64'].result != 'failure'
      && needs['build-arm64'].result != 'cancelled'
      && needs.promote.result != 'failure'
      && needs.promote.result != 'cancelled'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Fuse per-target arch images into multi-arch manifest lists
        env:
          REPO: ${{ github.repository }}
        run: |
          set -eu
          # One job per (destination, target); fuse in parallel with retry. The
          # SOURCES are always the GHCR :<target>-<arch> images (the only place
          # the per-arch images are pushed); the destination is either the GHCR
          # or the Docker Hub :<target> list. imagetools create copies the source
          # arch manifests into the Hub repo (by digest, untagged) when building
          # the Hub list, so the multi-arch pull works without ever tagging the
          # arch images on Hub. A missing source fails the target (and the job),
          # which is correct — a per-arch image always exists after a successful
          # build (or is reused from a prior push).
          # Each job is "<dest-repo>|<dest-tag>|<source-target>". The tag is usually
          # the target itself, but the snapshot lane also gets a moving alias, so the
          # destination tag and the source target are not always the same string.
          : > /tmp/fuse_jobs
          for t in $(sh shvr.sh buildset); do
            printf 'ghcr.io/%s|%s|%s\n' "$REPO" "$t" "$t" >> /tmp/fuse_jobs
            printf 'alganet/shell-versions|%s|%s\n' "$t" "$t" >> /tmp/fuse_jobs
          done
          # Moving alias: <shell>-snapshot (hyphen) is re-pointed every run at the
          # current <shell>_snapshot-<shortsha>, so users can pull the development
          # build without chasing a sha. The hyphen keeps the <shell>_<version>
          # namespace reserved for real, pinned targets -- an alias is not a target.
          # Same arch sources, second destination tag; no extra build.
          for t in $(sh shvr.sh snapshot); do
            printf 'ghcr.io/%s|%s-snapshot|%s\n' "$REPO" "${t%%_*}" "$t" >> /tmp/fuse_jobs
            printf 'alganet/shell-versions|%s-snapshot|%s\n' "${t%%_*}" "$t" >> /tmp/fuse_jobs
          done
          fuse_one() {
            dest="${1%%|*}"; rest="${1#*|}"
            tag="${rest%%|*}"; src="${rest##*|}"
            amd="ghcr.io/${REPO}:${src}-amd64"
            arm="ghcr.io/${REPO}:${src}-arm64"
            for a in 1 2 3; do
              if docker buildx imagetools create --tag "${dest}:${tag}" "$amd" "$arm"; then return 0; fi
              echo "retry $a: ${dest}:${tag}" >&2; sleep 5
            done
            echo "FAILED ${dest}:${tag}" >&2; return 1
          }
          export -f fuse_one
          xargs -P 8 -a /tmp/fuse_jobs -I {} bash -c 'fuse_one "$@"' _ {}
          printf 'fused %s manifest list(s) across 2 registries (sources: GHCR)\n' \
            "$(( $(wc -l < /tmp/fuse_jobs) / 2 ))" >> "$GITHUB_STEP_SUMMARY"
