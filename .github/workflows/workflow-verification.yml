name: Workflow Verification

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify-workflows:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Check workflow permissions
        run: |
          set -e
          missing=0
          for f in .github/workflows/*.yml; do
            if ! grep -q '^[[:space:]]*permissions:' "$f"; then
              echo "Workflow $f missing 'permissions' key"
              missing=1
            fi
          done
          if [ "$missing" = 1 ]; then
            echo "One or more workflows are missing the 'permissions' stanza."
            exit 1
          fi

      # The toolchain contract, enforced.
      #
      # `FROM toolchain AS builder` names a stage that lives in the Dockerfile, so
      # any build of a stage below it can re-derive the toolchain -- which means
      # compiling musl-cross-make. BuildKit does that SILENTLY on a cache miss: it
      # is not an error, just half an hour of work, once per build job, across
      # ~250 jobs. That is the bug this check exists to prevent from returning.
      #
      # The build jobs must therefore pass a `toolchain` named build context
      # pointing at the image the toolchain job published, which replaces the
      # stage outright. Then reuse is a fact, and a missing toolchain image is a
      # loud pull failure rather than a quiet recompile.
      #
      # So: every step that builds the `artifacts` target must carry a
      # `toolchain=docker-image://` build context. If you are here because this
      # check failed, do not delete the check.
      - name: Check the toolchain is consumed as an image, not rebuilt
        run: |
          set -e
          # The `artifacts` build lives in the reusable build-images.yml (called
          # per shard by docker.yml); docker.yml itself only builds `toolchain`.
          # Scan both so moving the build out of docker.yml cannot silently drop
          # the contract. set -e above fails the step on the first offending file.
          for f in .github/workflows/docker.yml .github/workflows/build-images.yml; do
            awk '
              function flush() {
                if (artifacts && !context) {
                  printf "%s:%d: builds target `artifacts` with no toolchain build context\n", FILENAME, start
                  bad = 1
                }
                artifacts = 0; context = 0
              }
              /^[[:space:]]*-[[:space:]]+(name|uses):/ { flush(); start = NR }
              /^[[:space:]]*target:[[:space:]]*artifacts[[:space:]]*$/ { artifacts = 1 }
              /toolchain=docker-image:\/\// { context = 1 }
              END {
                flush()
                if (bad) {
                  print ""
                  print "Every `artifacts` build must consume the toolchain image published by"
                  print "the toolchain job, via:"
                  print ""
                  print "    build-contexts: |"
                  print "      toolchain=docker-image://ghcr.io/<repo>:run-<run_id>-toolchain-<arch>"
                  print ""
                  print "Without it the build re-derives the toolchain stage from source, and"
                  print "BuildKit does so silently -- every build job recompiles musl-cross-make."
                  exit 1
                }
              }
            ' "$f"
          done
          echo "toolchain contract: ok"
  verify-patches:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      # Series drift: a selector that matches no version we build, an entry
      # naming a patch that is not there, a .diff nobody applies. All of these
      # would otherwise surface as a failed build, or worse, as a version quietly
      # going unpatched.
      - name: 'Patch series check'
        run: sh shvr.sh check_patches

  verify-checksums:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: 'Download Verification'
        run: |
          set -ex
          # ensure clean state and perform an initial download (should succeed)
          rm -f build/dash/0.5.13.4.tar.gz
          sh shvr.sh download dash_0.5.13.4

      - name: 'Corrupt checksum and assert download fails'
        run: |
          set -ex
          # backup checksum file
          cp checksums/sources/dash/0.5.13.4.tar.gz.sha256sums checksums/sources/dash/0.5.13.4.tar.gz.sha256sums.bak
          # corrupt checksum: replace hash with ones; keep filename
          printf '1111111111111111111111111111111111111111111111111111111111111111  %s\n' "0.5.13.4.tar.gz" > checksums/sources/dash/0.5.13.4.tar.gz.sha256sums
          # remove any existing artifact to force re-download
          rm -f build/dash/0.5.13.4.tar.gz
          set +e
          # attempt download once; if the worker network is flaky this may fail
          # for reasons other than checksum mismatch. Capture logs and RC so we
          # can differentiate mismatch from other failures.
          # run the download and capture the exit code; write logs to file
          sh shvr.sh download dash_0.5.13.4 > download.log 2>&1
          rc=$?
          # show the log to the step output so it appears in CI
          cat download.log
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Expected checksum verification to fail but it succeeded" >&2
            exit 1
          fi
          # ensure the failure was due to checksum mismatch; depending on the
          # runner and sha256sum version we may see one of multiple messages:
          # - our own 'sha256sum mismatch for ...' message
          # - a 'filename: FAILED' message emitted by 'sha256sum -c'
          # If neither is present then this is likely a transient network or
          # download tool error; fail the CI with the full log to help debug.
          grep -q "sha256sum mismatch" download.log || grep -q ": FAILED" download.log || (cat download.log && exit 1)

      - name: 'Restore checksum and verify success'
        run: |
          set -ex
          mv checksums/sources/dash/0.5.13.4.tar.gz.sha256sums.bak checksums/sources/dash/0.5.13.4.tar.gz.sha256sums
          rm -f build/dash/0.5.13.4.tar.gz
          sh shvr.sh download dash_0.5.13.4
